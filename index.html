<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheese Thief</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div class="stat">Stolen Cheese: <span id="cheese-count">0</span> / 200,000</div>
        <div class="stat">Points: <span id="points-count">0</span></div>
    </div>

    <div id="game-zone">
        <img id="cat-img" src="IMG_9246.png" alt="Sleeping Cat">
        <div id="haha-overlay">HAHA</div>
        
        <div id="bowl-source" class="bowl">
            🥣
            <div id="cheese-item" draggable="true">🧀</div>
        </div>

        <div id="bowl-target" class="bowl">🥣</div>
    </div>

    <div id="shop">
        <button id="btn-sell" onclick="sellCheese()">Sell Cheese</button>
        <div class="upgrades">
            <button id="up-extra" onclick="buyExtraCheese()">Extra Cheese (Lvl <span id="lvl-extra">0</span>)<br><span class="cost" id="cost-extra">10</span> Pts</button>
            <button id="up-less" onclick="buyLessCheese()">Less Req (Lvl <span id="lvl-less">0</span>)<br><span class="cost" id="cost-less">50</span> Pts</button>
            <button id="up-points" onclick="buyExtraPoints()">Multi (x<span id="val-multi">1</span>)<br><span class="cost" id="cost-multi">100</span> Pts</button>
        </div>
    </div>

    <div id="win-screen">
        <h1>🏆 YOU STOLE IT ALL! 🏆</h1>
        <p>Shero is still asleep.</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
